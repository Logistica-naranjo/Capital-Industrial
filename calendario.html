<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">

<title>Calendario Semanal — Capital Industrial</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--or:#E07B2A;--or2:#FFF3E8;--bg:#fff;--bg2:#F7F7F5;--bg3:#EFEFED;--txt:#1A1A1A;--txt2:#6B6B6B;--txt3:#ABABAB;--brd:#E5E5E3;--green:#1D9E75;--green2:#E1F5EE;--red:#A32D2D;--red2:#FCEBEB;--blue:#185FA5;--blue2:#E6F1FB;--r:8px;--rl:14px;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 12px rgba(0,0,0,.10)}
body{font-family:'Inter',sans-serif;color:var(--txt);background:var(--bg2);min-height:100vh}
.hdr{background:#1A1A1A;color:#fff;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-md)}
.hdr-i{max-width:900px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px}
.hdr-t{flex:1}.hdr-n{font-size:15px;font-weight:600}.hdr-s{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.week-nav{display:flex;align-items:center;gap:10px}
.nav-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.nav-btn:hover{background:rgba(255,255,255,.25)}
.week-lbl{font-size:12px;color:rgba(255,255,255,.8);white-space:nowrap}
.today-btn{background:var(--or);border:none;color:#fff;padding:6px 12px;border-radius:999px;font-size:11px;font-weight:600;cursor:pointer}
.main{max-width:900px;margin:0 auto;padding:16px 14px 40px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-card{background:var(--bg);border-radius:var(--rl);padding:12px;text-align:center;box-shadow:var(--shadow);border:.5px solid var(--brd)}
.stat-val{font-size:22px;font-weight:600}.stat-lbl{font-size:10px;color:var(--txt2);margin-top:3px}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:14px}
.day-col{background:var(--bg);border-radius:var(--rl);border:.5px solid var(--brd);overflow:hidden;box-shadow:var(--shadow);cursor:pointer}
.day-col:hover{border-color:var(--or)}
.day-col.today{border-color:var(--or);box-shadow:0 0 0 2px var(--or)}
.day-col.weekend{background:#FAFAF8}
.day-hdr{padding:8px 10px;text-align:center;border-bottom:.5px solid var(--brd)}
.day-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt2)}
.day-num{font-size:20px;font-weight:600;color:var(--txt);line-height:1.1;margin-top:2px}
.day-col.today .day-num{color:var(--or)}
.day-col.weekend .day-name{color:var(--txt3)}
.day-body{padding:7px}
.section-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:3px 5px;border-radius:4px;margin-bottom:3px;display:flex;align-items:center;gap:3px}
.lbl-start{background:var(--green2);color:var(--green)}.lbl-end{background:var(--red2);color:var(--red)}
.act-item{padding:4px 6px;margin-bottom:3px;border-radius:5px}
.act-start{background:var(--green2);border-left:2.5px solid var(--green)}
.act-end{background:var(--red2);border-left:2.5px solid var(--red)}
.act-urba-start{background:var(--blue2);border-left:2.5px solid var(--blue)}
.act-urba-end{background:#F3EFFE;border-left:2.5px solid #7C3AED}
.act-proc{font-size:10px;font-weight:600;color:var(--txt);line-height:1.3}
.act-paso{font-size:9px;color:var(--txt2);margin-top:1px;line-height:1.3}
.act-badge{font-size:9px;font-weight:600;padding:1px 5px;border-radius:999px;margin-top:2px;display:inline-block}
.badge-start{background:var(--green);color:#fff}.badge-end{background:var(--red);color:#fff}
.badge-urba{background:var(--blue);color:#fff}
.empty-day{font-size:10px;color:var(--txt3);text-align:center;padding:12px 0;font-style:italic}
.detail-panel{background:var(--bg);border-radius:var(--rl);border:.5px solid var(--brd);box-shadow:var(--shadow-md);padding:16px;margin-bottom:14px;display:none}
.detail-panel.on{display:block}
.detail-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--txt2)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.detail-section{background:var(--bg2);border-radius:var(--r);padding:12px}
.detail-sec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.ds-start{color:var(--green)}.ds-end{color:var(--red)}
.detail-item{padding:7px 9px;background:var(--bg);border-radius:6px;margin-bottom:5px}
.di-start{border-left:3px solid var(--green)}.di-end{border-left:3px solid var(--red)}.di-urba{border-left:3px solid var(--blue)}
.di-proc{font-size:12px;font-weight:600}.di-paso{font-size:11px;color:var(--txt2);margin-top:2px}.di-bods{font-size:10px;color:var(--txt3);margin-top:3px}
.di-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;float:right}
.dib-start{background:var(--green2);color:var(--green)}.dib-end{background:var(--red2);color:var(--red)}.dib-urba{background:var(--blue2);color:var(--blue)}
@media(max-width:600px){.detail-grid{grid-template-columns:1fr}.act-paso{display:none}.week-lbl{display:none}}
</style>
</head>

</main>

var TODAY=new Date();TODAY.setHours(0,0,0,0);
var curMonday=getMonday(TODAY);
var DAYS=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
var MONTHS=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

function getMonday(d){var day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1),m=new Date(d);m.setDate(diff);m.setHours(0,0,0,0);return m;}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtDate(d){return d.getFullYear()+"-"+(d.getMonth()<9?"0":"")+(d.getMonth()+1)+"-"+(d.getDate()<10?"0":"")+d.getDate();}

function isUrba(proc){return proc==="Urbanización"||proc.indexOf("rban")>=0;}

function renderWeek(){
  var grid=document.getElementById("week-grid");
  grid.innerHTML="";
  var mon=curMonday,sun=addDays(mon,6);
  document.getElementById("week-lbl").textContent=
    DAYS[mon.getDay()]+" "+mon.getDate()+" "+MONTHS[mon.getMonth()]+" — "+
    DAYS[sun.getDay()]+" "+sun.getDate()+" "+MONTHS[sun.getMonth()]+" "+sun.getFullYear();
  var totalS=0,totalE=0,activeDays=0;
  for(var i=0;i<7;i++){
    var day=addDays(mon,i),dateStr=fmtDate(day);
    var isToday=day.getTime()===TODAY.getTime(),isWE=day.getDay()===0||day.getDay()===6;
    var entry=CAL[dateStr]||{starts:[],ends:[]};
    var starts=entry.starts||[],ends=entry.ends||[];
    totalS+=starts.length;totalE+=ends.length;
    if(starts.length>0||ends.length>0)activeDays++;
    var col=document.createElement("div");
    col.className="day-col"+(isToday?" today":"")+(isWE?" weekend":"");
    col.setAttribute("data-date",dateStr);
    var h="<div class=\"day-hdr\"><div class=\"day-name\">"+DAYS[day.getDay()]+"</div><div class=\"day-num\">"+day.getDate()+"</div></div>";
    h+="<div class=\"day-body\">";
    if(!starts.length&&!ends.length){
      h+="<div class=\"empty-day\">Sin actividades</div>";
    } else {
      if(starts.length){
        h+="<div class=\"section-lbl lbl-start\">▶ Inician ("+starts.length+")</div>";
        starts.forEach(function(s){
          var cls=isUrba(s.proc)?"act-item act-urba-start":"act-item act-start";
          var bcls=isUrba(s.proc)?"act-badge badge-urba":"act-badge badge-start";
          h+="<div class=\""+cls+"\"><div class=\"act-proc\">"+s.proc+"</div><div class=\"act-paso\">"+s.paso+"</div><span class=\""+bcls+"\">"+s.n+(isUrba(s.proc)?"":" bod.")+"</span></div>";
        });
      }
      if(ends.length){
        h+="<div class=\"section-lbl lbl-end\" style=\"margin-top:5px;\">■ Finalizan ("+ends.length+")</div>";
        ends.forEach(function(e){
          var cls=isUrba(e.proc)?"act-item act-urba-end":"act-item act-end";
          var bcls=isUrba(e.proc)?"act-badge badge-urba":"act-badge badge-end";
          h+="<div class=\""+cls+"\"><div class=\"act-proc\">"+e.proc+"</div><div class=\"act-paso\">"+e.paso+"</div><span class=\""+bcls+"\">"+e.n+(isUrba(e.proc)?"":" bod.")+"</span></div>";
        });
      }
    }
    h+="</div>";
    col.innerHTML=h;
    grid.appendChild(col);
  }
  document.getElementById("stats-row").innerHTML=
    "<div class=\"stat-card\"><div class=\"stat-val\" style=\"color:var(--green)\">"+totalS+"</div><div class=\"stat-lbl\">Actividades inician</div></div>"+
    "<div class=\"stat-card\"><div class=\"stat-val\" style=\"color:var(--red)\">"+totalE+"</div><div class=\"stat-lbl\">Actividades finalizan</div></div>"+
    "<div class=\"stat-card\"><div class=\"stat-val\" style=\"color:var(--or)\">"+activeDays+"</div><div class=\"stat-lbl\">Días con actividad</div></div>";
}

function showDetail(dateStr){
  var entry=CAL[dateStr]||{starts:[],ends:[]};
  var starts=entry.starts||[],ends=entry.ends||[];
  var d=new Date(dateStr+"T00:00:00");
  document.getElementById("detail-title-txt").textContent=
    DAYS[d.getDay()]+" "+d.getDate()+" de "+MONTHS[d.getMonth()]+" "+d.getFullYear();
  var sHtml="<div class=\"detail-section\"><div class=\"detail-sec-title ds-start\">▶ Actividades que inician ("+starts.length+")</div>";
  if(!starts.length)sHtml+="<p style=\"font-size:12px;color:var(--txt3);\">Ninguna</p>";
  starts.forEach(function(s){
    var bcls=isUrba(s.proc)?"dib-urba":"dib-start";
    var dcls=isUrba(s.proc)?"detail-item di-urba":"detail-item di-start";
    sHtml+="<div class=\""+dcls+"\"><span class=\"di-badge "+bcls+"\">"+s.n+(isUrba(s.proc)?"":" bodegas")+"</span><div class=\"di-proc\">"+s.proc+"</div><div class=\"di-paso\">"+s.paso+"</div>";
    if(!isUrba(s.proc))sHtml+="<div class=\"di-bods\">"+s.dists+" · "+s.bodegas.slice(0,8).join(", ")+(s.bodegas.length>8?" ...":"")+"</div>";
    sHtml+="</div>";
  });
  sHtml+="</div>";
  var eHtml="<div class=\"detail-section\"><div class=\"detail-sec-title ds-end\">■ Actividades que finalizan ("+ends.length+")</div>";
  if(!ends.length)eHtml+="<p style=\"font-size:12px;color:var(--txt3);\">Ninguna</p>";
  ends.forEach(function(e){
    var bcls=isUrba(e.proc)?"dib-urba":"dib-end";
    var dcls=isUrba(e.proc)?"detail-item di-urba":"detail-item di-end";
    eHtml+="<div class=\""+dcls+"\"><span class=\"di-badge "+bcls+"\">"+e.n+(isUrba(e.proc)?"":" bodegas")+"</span><div class=\"di-proc\">"+e.proc+"</div><div class=\"di-paso\">"+e.paso+"</div>";
    if(!isUrba(e.proc))eHtml+="<div class=\"di-bods\">"+e.dists+" · "+e.bodegas.slice(0,8).join(", ")+(e.bodegas.length>8?" ...":"")+"</div>";
    eHtml+="</div>";
  });
  eHtml+="</div>";
  document.getElementById("detail-grid").innerHTML=sHtml+eHtml;
  document.getElementById("detail-panel").classList.add("on");
  document.getElementById("detail-panel").scrollIntoView({behavior:"smooth",block:"start"});
}

document.getElementById("prev-btn").addEventListener("click",function(){curMonday=addDays(curMonday,-7);renderWeek();document.getElementById("detail-panel").classList.remove("on");});
document.getElementById("next-btn").addEventListener("click",function(){curMonday=addDays(curMonday,7);renderWeek();document.getElementById("detail-panel").classList.remove("on");});
document.getElementById("today-btn").addEventListener("click",function(){curMonday=getMonday(TODAY);renderWeek();document.getElementById("detail-panel").classList.remove("on");});
document.getElementById("close-detail").addEventListener("click",function(){document.getElementById("detail-panel").classList.remove("on");});
document.addEventListener("click",function(e){
  var col=e.target.closest(".day-col");
  if(col){var date=col.getAttribute("data-date");if(date)showDetail(date);}
});
renderWeek();
</script>
