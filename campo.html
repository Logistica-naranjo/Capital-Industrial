<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --or:#E07B2A;--or2:#FFF3E8;--or3:#A85A18;
  --bg:#fff;--bg2:#F7F7F5;--bg3:#EFEFED;
  --txt:#1A1A1A;--txt2:#6B6B6B;--txt3:#ABABAB;
  --brd:#E5E5E3;--brd2:#D0D0CE;
  --r:8px;--rl:14px;
  --green:#1D9E75;--green2:#E1F5EE;--green3:#0F6E56;
  --red:#A32D2D;--red2:#FCEBEB;--red3:#791F1F;
  --blue:#185FA5;--blue2:#E6F1FB;--blue3:#0C447C;
  --purple:#534AB7;--purple2:#EEEDFE;--purple3:#3C3489;
  --shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 12px rgba(0,0,0,.10);
}
body{font-family:'Inter',sans-serif;color:var(--txt);background:var(--bg2);min-height:100vh;}
.header{background:#1A1A1A;color:#fff;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-md);}
.header-inner{max-width:500px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:10px;}
.logo-img{width:34px;height:30px;object-fit:contain;border-radius:4px;}
.header-title{font-size:15px;font-weight:600;flex:1;}
.header-sub{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px;}
.sup-badge{background:rgba(255,255,255,.15);border-radius:999px;padding:4px 10px;font-size:11px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:5px;cursor:pointer;}
.main{max-width:500px;margin:0 auto;padding:14px 14px 40px;}
.screen{display:none;}.screen.on{display:block;}
.login-card{background:var(--bg);border-radius:var(--rl);padding:24px 20px;box-shadow:var(--shadow-md);border:.5px solid var(--brd);margin-top:20px;text-align:center;}
.login-logo{width:60px;height:60px;background:var(--bg2);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.login-title{font-size:18px;font-weight:600;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--txt2);margin-bottom:22px;line-height:1.5;}
.inp{width:100%;border:.5px solid var(--brd2);border-radius:var(--r);padding:12px 13px;font-size:13px;font-family:'Inter',sans-serif;color:var(--txt);background:var(--bg);margin-bottom:9px;}
.inp:focus{outline:none;border-color:var(--or);}
.btn-primary{width:100%;padding:13px;background:var(--or);color:#fff;border:none;border-radius:var(--rl);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.sec{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;margin:16px 0 9px;display:flex;align-items:center;gap:6px;}
.sec::after{content:'';flex:1;height:.5px;background:var(--brd);}
.mode-toggle{display:flex;background:var(--bg3);border-radius:var(--r);padding:3px;gap:2px;margin-bottom:14px;}
.mode-btn{flex:1;padding:9px;background:none;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:var(--txt2);display:flex;align-items:center;justify-content:center;gap:5px;}
.mode-btn.active{background:var(--bg);color:var(--or);border:.5px solid var(--brd);}
.dist-toggle{display:flex;background:var(--bg3);border-radius:var(--r);padding:3px;gap:2px;margin-bottom:12px;}
.dist-btn{flex:1;padding:8px;background:none;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:var(--txt2);}
.dist-btn.active{background:var(--bg);color:var(--or);border:.5px solid var(--brd);}
.cluster-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.cl-chip{background:var(--bg);border:.5px solid var(--brd);border-radius:var(--r);padding:9px 7px;text-align:center;cursor:pointer;}
.cl-chip.active{border-color:var(--or);background:var(--or2);}
.cl-chip-name{font-size:12px;font-weight:500;}
.cl-chip.active .cl-chip-name{color:var(--or3);}
.bod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.bod-chip{background:var(--bg);border:.5px solid var(--brd);border-radius:var(--rl);padding:11px;cursor:pointer;}
.bod-chip:active{border-color:var(--or);}
.bod-chip-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;}
.bod-chip-name{font-size:13px;font-weight:600;}
.bod-badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:999px;}
.bp-done{background:var(--green2);color:var(--green3);}
.bp-prog{background:var(--or2);color:var(--or3);}
.bp-pend{background:var(--bg3);color:var(--txt2);}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--txt2);cursor:pointer;margin-bottom:14px;padding:7px 10px;background:var(--bg);border-radius:var(--r);border:.5px solid var(--brd);width:fit-content;}
.bod-detail-card{background:var(--bg);border-radius:var(--rl);padding:14px;margin-bottom:12px;box-shadow:var(--shadow);border:.5px solid var(--brd);}
.proc-card{background:var(--bg);border-radius:var(--rl);margin-bottom:10px;box-shadow:var(--shadow);border:.5px solid var(--brd);overflow:hidden;}
.proc-hdr{padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.proc-num{width:24px;height:24px;border-radius:50%;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.proc-title{flex:1;font-size:13px;font-weight:500;}
.proc-pct-lbl{font-size:13px;font-weight:600;}
.proc-mini-bar{height:3px;margin:0 13px 10px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.proc-steps{border-top:.5px solid var(--brd);display:none;}
.step-block{padding:11px 13px;border-bottom:.5px solid var(--brd);}
.step-block:last-child{border-bottom:none;}
.step-name-row{font-size:13px;font-weight:500;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;}
.step-dates{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px;}
.date-field{display:flex;flex-direction:column;gap:3px;}
.date-lbl{font-size:10px;color:var(--txt2);font-weight:500;}
.date-inp{border:.5px solid var(--brd2);border-radius:var(--r);padding:7px 8px;font-size:12px;font-family:'Inter',sans-serif;color:var(--txt);background:var(--bg);width:100%;}
.date-inp:focus{outline:none;border-color:var(--or);}
.pct-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.pct-lbl{font-size:12px;color:var(--txt2);flex-shrink:0;}
.pct-slider{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--bg3);outline:none;}
.pct-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--or);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.pct-val{font-size:13px;font-weight:600;width:36px;text-align:center;color:var(--or);}
.notes-inp{width:100%;border:.5px solid var(--brd2);border-radius:var(--r);padding:8px 10px;font-size:12px;font-family:'Inter',sans-serif;color:var(--txt);resize:none;background:var(--bg);margin-bottom:9px;}
.notes-inp:focus{outline:none;border-color:var(--or);}
.photo-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px dashed var(--brd2);border-radius:var(--r);cursor:pointer;color:var(--txt2);font-size:12px;width:100%;background:none;}
.photo-preview{display:none;margin-top:7px;position:relative;}
.photo-preview img{width:100%;border-radius:var(--r);max-height:160px;object-fit:cover;}
.photo-remove{position:absolute;top:6px;right:6px;width:26px;height:26px;background:rgba(0,0,0,.6);border:none;border-radius:50%;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
/* Urbanización */
.urba-step{background:var(--bg);border:.5px solid var(--brd);border-radius:var(--rl);padding:12px 13px;margin-bottom:9px;box-shadow:var(--shadow);}
.urba-step-name{font-size:13px;font-weight:500;margin-bottom:8px;}
.save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:.5px solid var(--brd);padding:11px 16px;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.08);}
.save-bar-inner{max-width:500px;margin:0 auto;}
.btn-save{width:100%;padding:13px;background:var(--or);color:#fff;border:none;border-radius:var(--rl);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-save.saving{background:var(--txt3);pointer-events:none;}
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:999px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;}
.toast-ok{background:var(--green);color:#fff;}
.toast-err{background:var(--red);color:#fff;}
.tag{font-size:10px;padding:2px 7px;border-radius:999px;}
.tag-done{background:var(--green2);color:var(--green3);}
.tag-pend{background:var(--bg3);color:var(--txt2);}
.tag-prog{background:var(--or2);color:var(--or3);}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

let supervisor='',supRol='';
let curDist='Distrito A',curCluster=null,curBodega=null;
let curMode='bodegas',curUrbaD='A';
let state={},photoData={},curPhotoStep=null,liveData={};

function login(){
  const name=document.getElementById('login-name').value.trim();
  const rol=document.getElementById('login-rol').value;
  if(!name){showToast('Ingresa tu nombre','err');return;}
  if(!rol){showToast('Selecciona tu rol','err');return;}
  supervisor=name;supRol=rol;
  document.getElementById('sup-badge').style.display='flex';
  document.getElementById('sup-name-hdr').textContent=name.split(' ')[0];
  loadLiveData();
  showScreen('selector');
  setDist('A');
}
function logout(){if(!confirm('¿Cerrar sesión?'))return;supervisor='';supRol='';document.getElementById('sup-badge').style.display='none';showScreen('login');}

async function loadLiveData(){
  try{const res=await fetch(DATA_URL+'?t='+Date.now());if(res.ok)liveData=await res.json();}catch(e){console.log('Sin datos previos');}
}

function setMode(m){
  curMode=m;
  ['bodegas','urba'].forEach(x=>document.getElementById('mode-'+x).classList.toggle('active',x===m));
  document.getElementById('selector-bodegas').style.display=m==='bodegas'?'block':'none';
  document.getElementById('selector-urba').style.display=m==='urba'?'block':'none';
}

function setDist(d){
  curDist='Distrito '+d;curCluster=null;
  ['A','B'].forEach(x=>document.getElementById('db-'+x).classList.toggle('active',x===d));
  buildClusters();
  document.getElementById('bod-sec').style.display='none';
  document.getElementById('bod-grid').innerHTML='';
}
function setUrbaD(d){
  curUrbaD=d;
  ['A','B'].forEach(x=>document.getElementById('ub-'+x).classList.toggle('active',x===d));
}
function openUrba(){
  buildUrbaRegistro();
  showScreen('registro');
  document.getElementById('save-bar').style.display='block';
}

function getProcAvg(d,cl,b,pi){
  if(!liveData.filas) return 0;
  const rows=liveData.filas.filter(r=>r['Distrito']===d&&r['Cluster']===cl&&r['Bodega']===b&&(r['Proceso']||'').includes(PROC_KEYS[pi]));
  if(!rows.length) return 0;
  return Math.round(rows.reduce((s,r)=>s+parseFloat(r['% Avance']||0),0)/rows.length);
}
function getWHPct(d,cl,b){
  return Math.round(([0,1,2].reduce((s,i)=>s+getProcAvg(d,cl,b,i),0))/3);
}

function buildClusters(){
  document.getElementById('cluster-grid').innerHTML=Object.keys(DB[curDist]).map(cl=>{
    const bods=DB[curDist][cl];
    const avg=Math.round(bods.reduce((s,b)=>s+getWHPct(curDist,cl,b),0)/bods.length);
    return `<div class="cl-chip${cl===curCluster?' active':''}" onclick="selectCluster('${cl}')">
      <div class="cl-chip-name">${cl.replace('Cluster ','C')}</div>
      <div style="font-size:10px;color:var(--txt3);margin-top:2px;">${avg}%</div>
    </div>`;
  }).join('');
}
function selectCluster(cl){
  curCluster=cl;buildClusters();buildBodegas();
  document.getElementById('bod-sec').style.display='flex';
}
function buildBodegas(){
  document.getElementById('bod-grid').innerHTML=DB[curDist][curCluster].map(b=>{
    const pct=getWHPct(curDist,curCluster,b);
    const bc=pct===100?'bp-done':pct>0?'bp-prog':'bp-pend';
    const lbl=pct===100?'Completa':pct>0?pct+'%':'Pendiente';
    return `<div class="bod-chip" onclick="openBodega('${b}')">
      <div class="bod-chip-top"><span class="bod-chip-name">${b}</span><span class="bod-badge ${bc}">${lbl}</span></div>
      <div style="height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:var(--or);border-radius:2px;"></div>
      </div>
    </div>`;
  }).join('');
}
function openBodega(b){curBodega=b;loadStateForBodega();buildBodegaRegistro();showScreen('registro');document.getElementById('save-bar').style.display='block';}

// ── STATE ──
function sk(){return curDist+'|'+curCluster+'|'+curBodega;}
function skUrba(){return 'URBA|'+curUrbaD;}

function loadStateForBodega(){
  const k=sk();
  if(state[k]) return;
  const ogKey=`${curDist}|${curCluster}|${curBodega}`;
  const ogProcs=OG_DB[ogKey]||{};
  const emptyOG={};
  Object.keys(ogProcs).forEach(proc=>{
    emptyOG[proc]=ogProcs[proc].map(()=>({av:0,ini:'',fin:'',nota:''}));
  });
  state[k]={
    p0:[0,0,0,0],p1:[0,0,0,0],p2:[0,0,0,0],
    ini0:['','','',''],fin0:['','','',''],notas0:['','','',''],
    ini1:['','','',''],fin1:['','','',''],notas1:['','','',''],
    ini2:['','','',''],fin2:['','','',''],notas2:['','','',''],
    og:emptyOG
  };
  if(liveData.filas){
    [0,1,2].forEach(pi=>{
      const rows=liveData.filas.filter(r=>r['Distrito']===curDist&&r['Cluster']===curCluster&&r['Bodega']===curBodega&&(r['Proceso']||'').includes(PROC_KEYS[pi]));
      rows.forEach((r,si)=>{
        state[k]['p'+pi][si]=parseFloat(r['% Avance']||0)||0;
        state[k]['ini'+pi][si]=r['Inicio Real']||'';
        state[k]['fin'+pi][si]=r['Fin Real']||'';
        state[k]['notas'+pi][si]=r['Notas']||'';
      });
    });
    Object.keys(ogProcs).forEach(proc=>{
      const rows=liveData.filas.filter(r=>r['Distrito']===curDist&&r['Cluster']===curCluster&&r['Bodega']===curBodega&&(r['Proceso']||'').includes(proc.split(' ')[0]));
      rows.forEach((r,si)=>{
        if(state[k].og[proc]&&state[k].og[proc][si]){
          state[k].og[proc][si]={av:parseFloat(r['% Avance']||0)||0,ini:r['Inicio Real']||'',fin:r['Fin Real']||'',nota:r['Notas']||''};
        }
      });
    });
  }
}

function loadStateForUrba(){
  const k=skUrba();
  if(state[k]) return;
  const pasos=curUrbaD==='A'?URBA_A:URBA_B;
  state[k]=pasos.map(()=>({av:0,ini:'',fin:'',nota:''}));
  if(liveData.filas){
    const rows=liveData.filas.filter(r=>r['Proceso']==='Urbanización'&&r['Distrito']===('Distrito '+curUrbaD));
    pasos.forEach((paso,i)=>{
      const row=rows.find(r=>r['Paso']===paso.n);
      if(row) state[k][i]={av:parseFloat(row['% Avance']||0)||0,ini:row['Inicio Real']||'',fin:row['Fin Real']||'',nota:row['Notas']||''};
    });
  }
}

// ── REGISTRO BODEGAS ──
function buildBodegaRegistro(){
  const k=sk();const s=state[k];
  const pct=getWHPct(curDist,curCluster,curBodega);
  const col=pct===100?'var(--green)':pct>0?'var(--or)':'var(--txt2)';
  const ogKey=`${curDist}|${curCluster}|${curBodega}`;
  const ogProcs=OG_DB[ogKey]||{};

  let procHtml='';
  [0,1,2].forEach(pi=>{
    const avg=Math.round(s['p'+pi].reduce((a,v)=>a+v,0)/s['p'+pi].length);
    const c=PROC_COLORS[pi];
    const steps=STEP_LABELS[pi].map((sname,si)=>{
      const pct2=s['p'+pi][si];
      const pKey=`bod|${pi}|${si}`;
      return buildStepBlock(sname,pKey,pct2,s['ini'+pi][si],s['fin'+pi][si],s['notas'+pi][si],c,
        (val)=>{s['p'+pi][si]=parseInt(val);updateBodHdr();},
        (val)=>{s['ini'+pi][si]=val;},
        (val)=>{s['fin'+pi][si]=val;},
        (val)=>{s['notas'+pi][si]=val;});
    }).join('');
    procHtml+=buildProcCard(pi+1,PROC_NAMES[pi],avg,c,steps);
  });

  // Obra Gris
  let ogHtml='';
  Object.keys(ogProcs).forEach((proc,ogi)=>{
    const pasos=ogProcs[proc];
    const stateOG=s.og[proc]||[];
    const avg=stateOG.length?Math.round(stateOG.reduce((a,p)=>a+p.av,0)/stateOG.length):0;
    const c=OG_COLORS[ogi];
    const steps=pasos.map((paso,si)=>{
      const ps=stateOG[si]||{av:0,ini:'',fin:'',nota:''};
      const pKey=`og|${ogi}|${si}`;
      return buildStepBlock(paso.p,pKey,ps.av,ps.ini,ps.fin,ps.nota,c,
        (val)=>{if(s.og[proc]&&s.og[proc][si])s.og[proc][si].av=parseInt(val);},
        (val)=>{if(s.og[proc]&&s.og[proc][si])s.og[proc][si].ini=val;},
        (val)=>{if(s.og[proc]&&s.og[proc][si])s.og[proc][si].fin=val;},
        (val)=>{if(s.og[proc]&&s.og[proc][si])s.og[proc][si].nota=val;});
    }).join('');
    ogHtml+=buildProcCard(ogi+4,OG_PROC_NAMES[ogi],avg,c,steps);
  });

  document.getElementById('registro-content').innerHTML=`
    <div class="back-btn" onclick="goBack()"><i class="ti ti-arrow-left"></i>${curCluster} — ${curDist.replace('Distrito ','D')}</div>
    <div class="bod-detail-card">
      <div style="font-size:16px;font-weight:600;">${curBodega}</div>
      <div style="font-size:12px;color:var(--txt2);">${curDist} · ${curCluster}</div>
      <div style="font-size:30px;font-weight:600;color:${col};margin-top:8px;" id="bod-pct-hdr">${pct}%</div>
      <div style="height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:6px;"><div id="bod-pct-bar" style="height:100%;width:${pct}%;background:${col};border-radius:3px;transition:width .3s;"></div></div>
      <div style="margin-top:8px;font-size:11px;color:var(--txt2);"><i class="ti ti-user" style="font-size:11px;"></i> ${supervisor} · ${supRol}</div>
    </div>
    <div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 8px;">Mezanines y Acabados</div>
    ${procHtml}
    ${ogHtml?'<div style="font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px;">Obra Gris</div>'+ogHtml:''}`;
}

function buildStepBlock(name,pKey,pct,ini,fin,nota,color,onPct,onIni,onFin,onNota){
  const tagClass=pct>=100?'tag-done':pct>0?'tag-prog':'tag-pend';
  const tagLabel=pct>=100?'Listo':pct>0?pct+'%':'Pendiente';
  const hasPhoto=!!photoData[pKey];
  const id=pKey.replace(/\|/g,'_');
  return `<div class="step-block">
    <div class="step-name-row">
      <span>${name}</span>
      <span class="tag ${tagClass}" id="tag_${id}">${tagLabel}</span>
    </div>
    <div class="step-dates">
      <div class="date-field"><div class="date-lbl">Inicio real</div><input class="date-inp" type="date" value="${ini}" onchange="(${onIni.toString()})(this.value)"/></div>
      <div class="date-field"><div class="date-lbl">Fin real</div><input class="date-inp" type="date" value="${fin}" onchange="(${onFin.toString()})(this.value)"/></div>
    </div>
    <div class="pct-row">
      <span class="pct-lbl">Avance</span>
      <input class="pct-slider" type="range" min="0" max="100" step="5" value="${pct}" id="sl_${id}"
        oninput="onSl(this,'${id}','${color.replace(/'/g,'"')}',${onPct.toString()})"
        style="background:linear-gradient(to right,${color} 0%,${color} ${pct}%,#EFEFED ${pct}%,#EFEFED 100%)"/>
      <span class="pct-val" id="pv_${id}" style="color:${color};">${pct}%</span>
    </div>
    <textarea class="notes-inp" rows="2" placeholder="Notas del paso…" onchange="(${onNota.toString()})(this.value)">${nota}</textarea>
    <button class="photo-btn" onclick="triggerPhoto('${pKey}')">
      <i class="ti ti-camera"></i>
      <span id="plbl_${id}">${hasPhoto?'Ver / cambiar foto':'Adjuntar foto'}</span>
    </button>
    <div class="photo-preview" id="pprev_${id}">
      ${hasPhoto?`<img src="${photoData[pKey]}" alt="foto"/><button class="photo-remove" onclick="removePhoto('${pKey}')"><i class="ti ti-x"></i></button>`:''}
    </div>
  </div>`;
}

function buildProcCard(num,title,avg,color,stepsHtml){
  return `<div class="proc-card">
    <div class="proc-hdr" onclick="toggleProc(this)">
      <div class="proc-num" style="background:${color}22;color:${color};">${num}</div>
      <span class="proc-title">${title}</span>
      <span class="proc-pct-lbl" style="color:${color};">${avg}%</span>
      <i class="ti ti-chevron-down" style="font-size:14px;color:var(--txt3);transition:transform .2s;margin-left:8px;"></i>
    </div>
    <div class="proc-mini-bar"><div style="height:100%;width:${avg}%;background:${color};border-radius:2px;"></div></div>
    <div class="proc-steps">${stepsHtml}</div>
  </div>`;
}

function onSl(el,id,color,cb){
  const val=parseInt(el.value);
  el.style.background=`linear-gradient(to right,${color} 0%,${color} ${val}%,#EFEFED ${val}%,#EFEFED 100%)`;
  document.getElementById('pv_'+id).textContent=val+'%';
  const tag=document.getElementById('tag_'+id);
  if(tag){tag.className='tag '+(val>=100?'tag-done':val>0?'tag-prog':'tag-pend');tag.textContent=val>=100?'Listo':val>0?val+'%':'Pendiente';}
  cb(val);
  updateBodHdr();
}
function updateBodHdr(){
  const pct=getWHPct(curDist,curCluster,curBodega);
  const col=pct===100?'var(--green)':pct>0?'var(--or)':'var(--txt2)';
  const lbl=document.getElementById('bod-pct-hdr');
  const bar=document.getElementById('bod-pct-bar');
  if(lbl){lbl.textContent=pct+'%';lbl.style.color=col;}
  if(bar){bar.style.width=pct+'%';bar.style.background=col;}
}
function toggleProc(hdr){
  const steps=hdr.parentElement.querySelector('.proc-steps');
  const chv=hdr.querySelector('.ti-chevron-down');
  const open=steps.style.display==='block';
  steps.style.display=open?'none':'block';
  if(chv)chv.style.transform=open?'':'rotate(180deg)';
}

// ── REGISTRO URBANIZACIÓN ──

  document.getElementById('registro-content').innerHTML=`
    <div class="back-btn" onclick="goBack()"><i class="ti ti-arrow-left"></i>Urbanización Distrito ${curUrbaD}</div>
    <div class="bod-detail-card" style="margin-bottom:12px;">
      <div style="font-size:15px;font-weight:600;">Urbanización — Distrito ${curUrbaD}</div>
      <div style="font-size:12px;color:var(--txt2);margin-top:2px;">${pasos.length} pasos a registrar</div>
      <div style="margin-top:8px;font-size:11px;color:var(--txt2);"><i class="ti ti-user" style="font-size:11px;"></i> ${supervisor} · ${supRol}</div>
    </div>
    ${steps}`;
}

function onSlUrba(el,id,stateKey,idx){
  const val=parseInt(el.value);
  el.style.background=`linear-gradient(to right,#185FA5 0%,#185FA5 ${val}%,#EFEFED ${val}%,#EFEFED 100%)`;
  document.getElementById('pv_'+id).textContent=val+'%';
  const tag=document.getElementById('tag_'+id);
  if(tag){tag.className='tag '+(val>=100?'tag-done':val>0?'tag-prog':'tag-pend');tag.textContent=val>=100?'Listo':val>0?val+'%':'Pendiente';}
  if(state[stateKey]&&state[stateKey][idx])state[stateKey][idx].av=val;
}

// ── FOTOS ──
function triggerPhoto(pKey){curPhotoStep=pKey;document.getElementById('photo-input').click();}
function handlePhoto(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    photoData[curPhotoStep]=ev.target.result;
    const id=curPhotoStep.replace(/\|/g,'_');
    const prev=document.getElementById('pprev_'+id);
    const lbl=document.getElementById('plbl_'+id);
    if(prev){prev.style.display='block';prev.innerHTML=`<img src="${ev.target.result}" alt="foto"/><button class="photo-remove" onclick="removePhoto('${curPhotoStep}')"><i class="ti ti-x"></i></button>`;}
    if(lbl)lbl.textContent='Ver / cambiar foto';
    showToast('Foto adjuntada','ok');
  };
  reader.readAsDataURL(file);e.target.value='';
}
function removePhoto(pKey){
  delete photoData[pKey];
  const id=pKey.replace(/\|/g,'_');
  const prev=document.getElementById('pprev_'+id);const lbl=document.getElementById('plbl_'+id);
  if(prev){prev.style.display='none';prev.innerHTML='';}
  if(lbl)lbl.textContent='Adjuntar foto';
}

// ── GUARDAR ──
async function guardar(){
  const btn=document.getElementById('btn-save');
  btn.classList.add('saving');
  btn.innerHTML='<i class="ti ti-loader" style="animation:spin .8s linear infinite;"></i> Guardando…';
  try{
    let filas=[];
    let distrito='',cluster='',bodega='';

    if(curMode==='bodegas'){
      const k=sk();const s=state[k];
      distrito=curDist;cluster=curCluster;bodega=curBodega;
      const ogKey=`${curDist}|${curCluster}|${curBodega}`;
      const ogProcs=OG_DB[ogKey]||{};
      [0,1,2].forEach(pi=>{
        [0,1,2,3].forEach(si=>{
          const pKey=`bod|${pi}|${si}`;
          filas.push({
            'Distrito':curDist,'Cluster':curCluster,'Bodega':curBodega,
            'Proceso':PROC_KEYS[pi],'Paso':['Montaje de estructura','Instalación de losacero','Armado de electromalla','Fundición','Montaje de tijeras','Costaneras','Canales','Enlaminado','Tablayeso + ventanas','Piso','Pintura','Puertas'][pi*4+si],
            '% Avance':String(s['p'+pi][si]||0),
            'Inicio Real':s['ini'+pi][si]||'','Fin Real':s['fin'+pi][si]||'',
            'Notas':s['notas'+pi][si]||'','Foto Evidencia':photoData[pKey]||'',
            'Supervisor':supervisor,'Rol':supRol,
            'Ultima actualizacion':new Date().toISOString()
          });
        });
      });
      Object.keys(ogProcs).forEach((proc,ogi)=>{
        const pasos=ogProcs[proc];
        const stateOG=s.og[proc]||[];
        pasos.forEach((paso,si)=>{
          const ps=stateOG[si]||{av:0,ini:'',fin:'',nota:''};
          const pKey=`og|${ogi}|${si}`;
          filas.push({
            'Distrito':curDist,'Cluster':curCluster,'Bodega':curBodega,
            'Proceso':proc,'Paso':paso.p,
            '% Avance':String(ps.av||0),
            'Inicio Real':ps.ini||'','Fin Real':ps.fin||'',
            'Notas':ps.nota||'','Foto Evidencia':photoData[pKey]||'',
            'Supervisor':supervisor,'Rol':supRol,
            'Ultima actualizacion':new Date().toISOString()
          });
        });
      });
    } else {
      // Urbanización
      const k=skUrba();const s=state[k];
      const pasos=curUrbaD==='A'?URBA_A:URBA_B;
      distrito='Distrito '+curUrbaD;cluster='Urbanización';bodega='Urbanización';
      pasos.forEach((paso,i)=>{
        const ps=s[i]||{av:0,ini:'',fin:'',nota:''};
        const pKey=`urba|${curUrbaD}|${i}`;
        filas.push({
          'Distrito':'Distrito '+curUrbaD,'Cluster':'Urbanización','Bodega':'Urbanización',
          'Proceso':'Urbanización','Paso':paso.n,
          '% Avance':String(ps.av||0),
          'Inicio Real':ps.ini||'','Fin Real':ps.fin||'',
          'Notas':ps.nota||'','Foto Evidencia':photoData[pKey]||'',
          'Supervisor':supervisor,'Rol':supRol,
          'Ultima actualizacion':new Date().toISOString()
        });
      });
    }

    const res=await fetch(WORKER_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({distrito,cluster,bodega,filas})
    });
    const result=await res.json();
    if(result.ok){
      showToast('✓ Avances guardados','ok');
      setTimeout(()=>goBack(),1500);
    } else {
      showToast('Error al guardar. Intenta de nuevo.','err');
      console.log(result.error);
    }
  }catch(e){showToast('Error de conexión.','err');console.log(e);}
  btn.classList.remove('saving');
  btn.innerHTML='<i class="ti ti-device-floppy"></i> Guardar avances';
}

function goBack(){showScreen('selector');document.getElementById('save-bar').style.display='none';buildClusters();if(curCluster)buildBodegas();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));document.getElementById('s-'+id).classList.add('on');}
function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show toast-'+type;setTimeout(()=>t.classList.remove('show'),2800);}
</script>
