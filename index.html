<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Capital Industrial">
<title>Capital Industrial</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--or:#E07B2A;--or2:#FFF3E8;--or3:#A85A18;--bg:#fff;--bg2:#F7F7F5;--bg3:#EFEFED;--txt:#1A1A1A;--txt2:#6B6B6B;--txt3:#ABABAB;--brd:#E5E5E3;--r:8px;--rl:14px;--green:#1D9E75;--green2:#E1F5EE;--green3:#0F6E56;--red:#A32D2D;--red2:#FCEBEB;--red3:#791F1F;--amber:#BA7517;--amber2:#FAEEDA;--amber3:#854F0B;--blue:#185FA5;--blue2:#E6F1FB;--blue3:#0C447C;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 12px rgba(0,0,0,.10)}
body{font-family:'Inter',sans-serif;color:var(--txt);background:var(--bg2);min-height:100vh}
.hdr{background:#1A1A1A;color:#fff;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-md)}
.hdr-i{max-width:520px;margin:0 auto;padding:11px 15px;display:flex;align-items:center;gap:10px}
.logo{width:34px;height:30px;object-fit:contain;border-radius:4px}
.hdr-t{flex:1}.hdr-n{font-size:14px;font-weight:600}.hdr-s{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.upd-l{font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.05em;text-align:right}
.upd-v{font-size:11px;color:rgba(255,255,255,.7);margin-top:1px;text-align:right}
.nav{background:var(--bg);border-bottom:1px solid var(--brd);position:sticky;top:57px;z-index:90;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-i{max-width:520px;margin:0 auto;display:flex;padding:0 6px}
.nb{padding:11px 11px;font-size:12px;font-weight:500;color:var(--txt2);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;display:flex;align-items:center;gap:4px}
.nb i{font-size:14px}.nb.on{color:var(--or);border-bottom-color:var(--or)}
.main{max-width:520px;margin:0 auto;padding:14px 13px 32px}
.scr{display:none}.scr.on{display:block}
.ld{text-align:center;padding:60px 20px}
.sp{width:34px;height:34px;border:3px solid var(--brd);border-top-color:var(--or);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.kg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.kc{background:var(--bg);border-radius:var(--rl);padding:13px;box-shadow:var(--shadow);border:.5px solid var(--brd)}
.ki{font-size:17px;margin-bottom:5px}.kv{font-size:26px;font-weight:600;letter-spacing:-.02em;line-height:1}.kl{font-size:11px;color:var(--txt2);margin-top:3px}
.sec{font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;margin:18px 0 9px;display:flex;align-items:center;gap:6px}
.sec:after{content:'';flex:1;height:.5px;background:var(--brd)}
.pb{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}.pf{height:100%;border-radius:3px;transition:width .5s}
.dc{background:var(--bg);border-radius:var(--rl);padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow);border:.5px solid var(--brd);cursor:pointer}
.dt{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.di{width:35px;height:35px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.dn{font-size:14px;font-weight:600}.ds{font-size:11px;color:var(--txt2);margin-top:2px}.dp{font-size:19px;font-weight:600}
.cv{font-size:15px;color:var(--txt3);transition:transform .2s}.cv.op{transform:rotate(180deg)}
.cl-l{border-top:.5px solid var(--brd);margin-top:9px;padding-top:9px;display:none}
.cl-r{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid var(--brd);cursor:pointer}.cl-r:last-child{border-bottom:none}
.cl-n{font-size:13px;font-weight:500;flex:1}.cl-bw{width:78px}.cl-p{font-size:11px;color:var(--txt2);text-align:right;margin-bottom:2px}
.bg2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.bc3{background:var(--bg);border-radius:var(--rl);padding:11px;box-shadow:var(--shadow);border:.5px solid var(--brd);cursor:pointer}.bc3:active{border-color:var(--or)}
.bt{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}.bn{font-size:13px;font-weight:600}
.bb{font-size:10px;font-weight:500;padding:2px 7px;border-radius:999px}
.bbd{background:var(--green2);color:var(--green3)}.bbp{background:var(--amber2);color:var(--amber3)}.bbe{background:var(--bg3);color:var(--txt2)}
.pr{display:flex;flex-direction:column;gap:4px}.prr{display:flex;align-items:center;gap:5px}
.prl{font-size:10px;color:var(--txt2);width:13px;text-align:center;flex-shrink:0}
.prt{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}.prp{font-size:10px;color:var(--txt2);width:22px;text-align:right}
.bk{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--txt2);cursor:pointer;margin-bottom:13px;padding:7px 10px;background:var(--bg);border-radius:var(--r);border:.5px solid var(--brd);width:fit-content}
.wh{background:var(--bg);border-radius:var(--rl);padding:13px;margin-bottom:11px;box-shadow:var(--shadow);border:.5px solid var(--brd)}
.whn{font-size:15px;font-weight:600}.whs{font-size:12px;color:var(--txt2);margin-top:2px}.whp{font-size:28px;font-weight:600;margin-top:9px}
.prc{background:var(--bg);border-radius:var(--rl);margin-bottom:9px;box-shadow:var(--shadow);border:.5px solid var(--brd);overflow:hidden}
.ph{padding:10px 13px;display:flex;align-items:center;gap:9px;cursor:pointer}.ph:active{background:var(--bg2)}
.pn{width:24px;height:24px;border-radius:50%;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pt{flex:1;font-size:13px;font-weight:500}.pp{font-size:13px;font-weight:600}
.pmb{height:3px;margin:0 13px 9px;background:var(--bg3);border-radius:2px;overflow:hidden}
.sl3{border-top:.5px solid var(--brd)}.si{padding:9px 13px;border-bottom:.5px solid var(--brd)}.si:last-child{border-bottom:none}
.st2{display:flex;align-items:center;gap:8px;margin-bottom:5px}.sn2{font-size:12px;flex:1}
.sw{display:flex;align-items:center;gap:5px}
.str{width:46px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}.sp3{font-size:11px;font-weight:500;width:27px;text-align:right}
.stg{font-size:9px;padding:2px 5px;border-radius:999px}
.tgd{background:var(--green2);color:var(--green3)}.tgo{background:var(--green2);color:var(--green3)}.tgr{background:var(--amber2);color:var(--amber3)}.tgl{background:var(--red2);color:var(--red3)}.tgp{background:var(--bg3);color:var(--txt2)}
.nota{font-size:11px;color:var(--txt2);font-style:italic;padding:4px 8px;background:var(--bg2);border-radius:var(--r);margin-top:4px;border-left:2px solid var(--brd)}
.cc2{background:var(--bg);border-radius:var(--rl);padding:13px;box-shadow:var(--shadow);border:.5px solid var(--brd);margin-bottom:11px}
.ct{font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:11px;text-transform:uppercase;letter-spacing:.05em}
.psr{display:flex;align-items:center;gap:9px;margin-bottom:8px}.psr:last-child{margin-bottom:0}
.psn{font-size:11px;font-weight:500;width:85px;flex-shrink:0;line-height:1.3}
.psb{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}.psp{font-size:11px;font-weight:600;width:29px;text-align:right}
.rr2{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:.5px solid var(--brd)}.rr2:last-child{border-bottom:none}
.rn{font-size:11px;color:var(--txt3);width:16px;text-align:right;flex-shrink:0}.rl2{font-size:11px;flex:1}.rbw{width:58px}
.rb{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:2px}.rp{font-size:11px;text-align:right}
.sm2{background:var(--bg);border-radius:var(--rl);padding:10px 12px;margin-bottom:7px;box-shadow:var(--shadow);border:.5px solid var(--brd);display:flex;align-items:center;gap:9px;cursor:pointer}
.smd{width:11px;height:11px;border-radius:50%;flex-shrink:0}.smi{flex:1}.smn{font-size:13px;font-weight:500}.sms{font-size:11px;color:var(--txt2);margin-top:2px}.smp{font-size:14px;font-weight:600}
.smb{font-size:10px;font-weight:500;padding:2px 6px;border-radius:999px}
.sc{background:var(--red2);color:var(--red3)}.sk{background:var(--amber2);color:var(--amber3)}.so{background:var(--green2);color:var(--green3)}.spe{background:var(--bg3);color:var(--txt2)}
.ec2{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:13px}
.ep{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:999px;font-size:11px;font-weight:500;border:1px solid transparent;cursor:pointer}
.ea{background:var(--bg);border-color:var(--brd);color:var(--txt2)}.ea.on{background:#1A1A1A;border-color:#1A1A1A;color:#fff}
.el{background:var(--red2);color:var(--red3)}.el.on{background:var(--red);color:#fff}
.ek{background:var(--amber2);color:var(--amber3)}.ek.on{background:var(--amber);color:#fff}
.eo{background:var(--green2);color:var(--green3)}.eo.on{background:var(--green);color:#fff}
.ut{display:flex;background:var(--bg3);border-radius:var(--r);padding:3px;gap:2px;margin-bottom:13px}
.ub{flex:1;padding:8px;background:none;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:var(--txt2)}
.ub.on{background:var(--bg);color:var(--or);border:.5px solid var(--brd)}
.csl2{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.cse{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt2)}.csd{width:12px;height:4px;border-radius:2px}
</style>
</head>
